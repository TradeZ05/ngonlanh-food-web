<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - Ngon Lành</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="otp-page">
    <img src="./anh/aa.png" class="hero-bg" alt="background">

    <div class="otp-box" style="text-align: center;">
        <div class="otp-content">
            <div class="lock" style="font-size: 40px; margin-bottom: 10px;">🔒</div>

            <h2>Nhập mã OTP</h2>

            <p style="color: #555; font-size: 14px; margin-bottom: 20px;">
                Vui lòng nhập mã OTP đã được gửi đến email của bạn.<br>
            </p>

            <div class="otp-inputs" id="otp-container">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
            </div>
        </div>
        
        <button class="otp-btn btn-signup" onclick="goNext()" style="margin-top: 30px; width: 100%;">XÁC NHẬN</button>
    </div>
</div>

<script>
    // Khai báo đường dẫn API (Sửa lại cổng nếu Backend của ní khác 8080)
    const API_BASE_URL = "http://localhost:8080/api";

    // 1. Logic: Tự động nhảy ô khi gõ OTP (Giữ nguyên vì UX đang quá mượt)
    const inputs = document.querySelectorAll('.otp-input');
    
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            if (e.target.value !== '' && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    window.onload = () => inputs[0].focus();

    // 2. Logic gọi API xác thực OTP
    async function goNext() {
        let otpCode = '';
        inputs.forEach(input => {
            otpCode += input.value;
        });

        if (otpCode.length < 6) {
            alert('⚠️ Ní phải nhập đủ 6 số nhé!');
            return;
        }

        // LẤY "USERNAME" TỪ TRONG TỦ RA
        const username = localStorage.getItem('registeredUsername'); 
        
        if(!username) {
            alert("⚠️ Lỗi: Không tìm thấy Tên đăng nhập. Vui lòng đăng ký lại!");
            window.location.href = 'dangki.html';
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/auth/verify-otp`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    // ĐÓNG GÓI GỬI LÊN BẰNG BIẾN "username" CHO KHỚP VỚI SPRING BOOT
                    username: username,
                    otp: otpCode
                })
            });

            if (response.ok) {
                alert('🎉 Xác thực thành công! Hệ thống chuyển sang trang Đăng nhập.');
                localStorage.removeItem('registeredUsername'); // Dọn dẹp rác
                window.location.href = 'dangnhap.html'; 
            } else {
                const errorMsg = await response.text();
                alert('❌ ' + errorMsg); // Hiển thị đúng cái dòng chữ mà Java trả về luôn
                
                // Xóa trắng và focus lại ô đầu tiên cho khách nhập lại
                inputs.forEach(input => input.value = '');
                inputs[0].focus();
            }
        } catch (error) {
            console.error("Lỗi Server:", error);
            alert("⚠️ Không thể kết nối với Backend. Ní kiểm tra lại Spring Boot nhé!");
        }
    }
</script>

</body>
</html>
