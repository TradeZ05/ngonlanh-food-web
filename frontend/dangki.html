<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngon Lành - Đăng Ký</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-page">
    <div class="bg">
        <img src="./anh/aa.png" alt="">
    </div>
    <main class="frame-main">
        <div class="ellipse-glow"></div>
        <div class="content-wrapper">
            <section class="brand-section">
                <div class="logo-circle">
                    <img src="./anh/LOGO_L.png" alt="">
                </div>
                <div class="brand-text">
                    <h1 class="brand-name">Ngon Lành</h1>
                    <p class="slogan">Ăn Ngon , Sống Lành</p>
                </div>
            </section>
            
            <section class="frame-231">
                <h2 class="form-title">ĐĂNG KÝ</h2>
                
                <form id="form-dang-ky" class="signup-form">
                    <div class="input-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" id="reg-username" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Nhập lại mật khẩu</label>
                        <input type="password" id="reg-confirm-password" required>
                    </div>
                    
                    <button type="submit" class="btn-signup">Đăng ký</button>
                    
                    <div class="divider">Hoặc đăng ký bằng</div>
                    
                    <div class="social-group">
                        <button type="button" class="btn-social fb">f</button>
                        <button type="button" class="btn-social google">G</button>
                    </div>
                    
                    <p class="footer-text">
                        Đã có tài khoản? <a href="dangnhap.html" class="link-login">Đăng nhập ngay</a>
                    </p>
                </form>
            </section>
        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/dangky.js"></script>
</body>
</html>
