<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngon Lành - Đăng Nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .bg, .ellipse-458 { pointer-events: none !important; }
        .frame-226, .content-wrapper, .login-form { position: relative !important; z-index: 10 !important; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="bg">
            <img src="./anh/aa.png" alt="">
        </div>
        
        <main class="frame-226">
            <div class="ellipse-458"></div>

            <div class="content-wrapper">
                <section class="content-container">
                    <div class="logo-wrapper">
                        <img src="./anh/LOGO_L.png" alt="Logo Ngon Lành">
                    </div>
                    <div class="brand-info">
                        <h1 class="brand-details">Ngon Lành</h1>
                        <p class="slogan">Ăn Ngon, Sống Lành</p>
                    </div>
                </section>

                <section class="frame-223">
                    <h2 class="form-title">ĐĂNG NHẬP</h2>
                    
                    <form id="form-dang-nhap" class="login-form">
                        <div class="input-group">
                            <label>Tên đăng nhập</label>
                            <input type="text" id="login-username" placeholder="" required>
                        </div>
                        
                        <div class="input-group">
                            <label>Mật khẩu</label>
                            <input type="password" id="login-password" placeholder="" required>
                        </div>

                        <div class="forgot-pwd">
                            <a href="#">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn-submit">Đăng nhập</button>

                        <div class="divider">Hoặc đăng nhập bằng</div>

                        <div class="social-actions">
                            <button type="button" class="btn-social fb">f</button>
                            <button type="button" class="btn-social google">G</button>
                        </div>

                        <p class="footer-text">
                            Chưa có tài khoản? <a href="dangki.html" class="link-signup">Đăng ký ngay</a>
                        </p>
                    </form>
                </section>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8080/api"; 

        document.addEventListener('DOMContentLoaded', () => {
            const formDangNhap = document.getElementById('form-dang-nhap');

            if (formDangNhap) {
                formDangNhap.addEventListener('submit', async (e) => {
                    e.preventDefault(); 
                    
                    const username = document.getElementById('login-username').value.trim();
                    const password = document.getElementById('login-password').value;

                    const loginData = {
                        username: username,
                        password: password
                    };

                    try {
                        const response = await fetch(`${API_BASE_URL}/auth/login`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(loginData)
                        });

                        if (response.ok) {
                            const data = await response.json(); 
                            const token = data.token || data.accessToken || data.jwt; 

                            if (token) {
                                localStorage.setItem('accessToken', token);
                                alert("🎉 Đăng nhập thành công! Lên món thôi!");
                                window.location.href = "thucdonchay.html"; 
                            } else {
                                alert("Vào được rồi nhưng Backend không trả về Token!");
                            }
                        } else {
                            alert("❌ Sai tên đăng nhập hoặc mật khẩu!");
                        }
                    } catch (error) {
                        console.error("Lỗi kết nối:", error);
                        alert("⚠️ Spring Boot từ chối kết nối! Ní xem lại server bật chưa nhé.");
                    }
                });
            }
        });
    </script>
</body>
</html>
