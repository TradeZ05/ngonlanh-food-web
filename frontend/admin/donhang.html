<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Đơn Hàng</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="sidebar">
    <h2>NGON LÀNH</h2>
    <ul>
        <li><a href="tongquan.html">Tổng Quan</a></li>
        <li><a href="donhang.html" class="active">Đơn Hàng</a></li>
        <li><a href="thucdon.html">Thực Đơn</a></li>
        <li><a href="khachhang.html">Khách Hàng</a></li>
        <li><a href="caidat.html">Cài Đặt</a></li>
        <li><a href="#" onclick="logout()">Đăng Xuất</a></li>
    </ul>

<div class="main-content">
    <div class="header">
        <h2>Dimage Sách Đơn Hàng</h2>
        <select id="filter-status" onchange="loadOrders(this.value)">
            <option value="">Tất cả trạng thái</option>
            <option value="PENDING">Chờ xác nhận</option>
            <option value="SHIPPING">Đang giao</option>
            <option value="DELIVERED">Đã giao</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Mã Đơn</th>
                <th>Khách Hàng</th>
                <th>Ngày Đặt</th>
                <th>Tổng Tiền</th>
                <th>Trạng Thái</th>
                <th>Thao Tác</th>
            </tr>
            </thead>
            <tbody id="order-table-body">
            </tbody>
        </table>
    </div>
</div>

<script src="../user/js/api.js"></script>
<script src="js/order.js"></script>
</body>
</html>
