<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Cài Đặt Tài Khoản</title>
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 1024px) {
            .settings-grid { grid-template-columns: 1fr; }
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>NGON LÀNH</h2>
    <ul>
        <li><a href="tongquan.html">Tổng Quan</a></li>
        <li><a href="donhang.html">Đơn Hàng</a></li>
        <li><a href="thucdon.html">Thực Đơn</a></li>
        <li><a href="khachhang.html">Khách Hàng</a></li>
        <li><a href="caidat.html" class="active">Cài Đặt</a></li>
        <li><a href="#" onclick="logout()">Đăng Xuất</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="header">
        <h2>Cài Đặt Hệ Thống</h2>
        <div id="admin-name">Cài đặt tài khoản</div>
    </div>

    <div class="settings-grid">
        <div class="form-container" style="max-width: 100%;">
            <div class="section-title">
                <span>👤</span> Thông tin cá nhân
            </div>
            <form id="profile-form">
                <div class="form-group">
                    <label>Tên hiển thị</label>
                    <input type="text" id="admin-fullname" placeholder="Nhập họ và tên">
                </div>
                <div class="form-group">
                    <label>Email liên hệ</label>
                    <input type="email" id="admin-email" disabled style="background-color: #f1f5f9; cursor: not-allowed;">
                    <small style="color: var(--text-muted);">Email dùng để đăng nhập và không thể thay đổi.</small>
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text" id="admin-phone" placeholder="Nhập số điện thoại">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Lưu thay đổi</button>
            </form>
        </div>

        <div class="form-container" style="max-width: 100%;">
            <div class="section-title">
                <span>🔒</span> Bảo mật & Mật khẩu
            </div>
            <form id="password-form">
                <div class="form-group">
                    <label>Mật khẩu hiện tại</label>
                    <input type="password" id="current-password" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu mới</label>
                    <input type="password" id="new-password" required>
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirm-password" required>
                </div>
                <button type="submit" class="btn btn-danger" style="width: 100%; background-color: var(--sidebar-active-text);">Cập nhật mật khẩu</button>
            </form>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
